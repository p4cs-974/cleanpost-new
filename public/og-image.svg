<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#fafafa"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e5e5" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Cl mark -->
  <rect x="100" y="200" width="120" height="120" rx="24" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="160" y="295" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="600" text-anchor="middle" fill="#171717">Cl</text>
  
  <!-- Title -->
  <text x="100" y="400" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="600" fill="#171717">CleanPost</text>
  
  <!-- Tagline -->
  <text x="100" y="470" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="400" fill="#525252">Remove EXIF metadata. Your photos never leave your device.</text>
  
  <!-- Privacy badge -->
  <g transform="translate(100, 520)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#171717"/>
    <text x="70" y="24" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="500" text-anchor="middle" fill="#ffffff">100% Private</text>
  </g>
</svg>
